name: emanuel_pizzeria
description: A new Flutter project for Emanuel Pizzeria.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  go_router: ^17.0.0
  google_fonts: ^6.3.2
  dio: ^5.9.2
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  responsive_framework: ^1.5.1
  url_launcher: ^6.3.2
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.2

# Removed overrides to allow natural resolution on modern SDK
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/homepage/
    - assets/images/menu/
    - assets/images/bookings/
    - assets/images/shippings/
